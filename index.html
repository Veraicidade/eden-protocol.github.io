<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex, nofollow">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ICU</title>
  <style>
    :root {
      --bg: #000;
      --text: #cfcfcf;
      --border: #666;
      --red: #a30000;
      --link: #7a0000;
      --panel: rgba(0, 0, 0, 0.82);
      --shake-x: 2px;
      --shake-y: 2px;
      --shake-rot: 0.6deg;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      overflow-x: hidden;
    }

    body {
      color: var(--text);
      font-family: monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background:
        radial-gradient(circle at center, transparent 40%, rgba(0,0,0,0.6) 100%);
    }

    body.shaking {
      animation: pageShake 0.12s infinite linear;
    }

    @keyframes pageShake {
      0%   { transform: translate(0, 0) rotate(0deg); }
      10%  { transform: translate(calc(var(--shake-x) * -1), var(--shake-y)) rotate(calc(var(--shake-rot) * -1)); }
      20%  { transform: translate(var(--shake-x), calc(var(--shake-y) * -1)) rotate(var(--shake-rot)); }
      30%  { transform: translate(calc(var(--shake-x) * -1), 0) rotate(calc(var(--shake-rot) * -1)); }
      40%  { transform: translate(var(--shake-x), var(--shake-y)) rotate(var(--shake-rot)); }
      50%  { transform: translate(0, calc(var(--shake-y) * -1)) rotate(0deg); }
      60%  { transform: translate(calc(var(--shake-x) * -1), var(--shake-y)) rotate(calc(var(--shake-rot) * -1)); }
      70%  { transform: translate(var(--shake-x), 0) rotate(var(--shake-rot)); }
      80%  { transform: translate(calc(var(--shake-x) * -1), calc(var(--shake-y) * -1)) rotate(calc(var(--shake-rot) * -1)); }
      90%  { transform: translate(var(--shake-x), var(--shake-y)) rotate(var(--shake-rot)); }
      100% { transform: translate(0, 0) rotate(0deg); }
    }

    a {
      color: var(--link);
    }

    .hidden {
      display: none !important;
    }

    .red {
      color: var(--red);
    }

    #eyes-layer {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      overflow: hidden;
    }

    .eye {
      position: absolute;
      width: 90px;
      height: 46px;
      border: 2px solid rgba(255,255,255,0.9);
      border-radius: 50% / 60%;
      opacity: 0;
      animation:
        eyeFadeIn 0.8s ease forwards,
        eyeBlink var(--blink-duration, 5s) infinite ease-in-out;
      filter: drop-shadow(0 0 6px rgba(255,255,255,0.12));
      display: flex;
      justify-content: center;
      align-items: center;
      transform-origin: center;
    }

    .eye .iris {
      width: 18px;
      height: 18px;
      background: #fff;
      border-radius: 50%;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 0 12px rgba(255,255,255,0.35);
    }

    .eye .pupil {
      width: 8px;
      height: 8px;
      background: #000;
      border-radius: 50%;
      transform: translate(0, 0);
      transition: transform 0.08s linear;
    }

    @keyframes eyeFadeIn {
      0% { opacity: 0; }
      100% { opacity: var(--eye-opacity, 0.8); }
    }

    @keyframes eyeBlink {
      0%, 44%, 48%, 100% { height: 46px; }
      46% { height: 6px; }
    }

    .panel {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 760px;
      text-align: center;
      background: var(--panel);
      border: 1px solid #222;
      padding: 28px;
      backdrop-filter: blur(2px);
      box-shadow: 0 0 24px rgba(0,0,0,0.45);
    }

    .glitch {
      animation: glitchFlash 0.18s linear 2;
    }

    @keyframes glitchFlash {
      0%   { opacity: 1; filter: none; }
      25%  { opacity: 0.85; filter: contrast(1.4) brightness(1.15); }
      50%  { opacity: 1; filter: hue-rotate(8deg); }
      75%  { opacity: 0.92; filter: contrast(1.2); }
      100% { opacity: 1; filter: none; }
    }

    .screen-title {
      margin-top: 0;
      margin-bottom: 10px;
    }

    .subtle {
      color: #8b8b8b;
      font-size: 13px;
    }

    .login-box {
      max-width: 420px;
      margin: 24px auto 0 auto;
      text-align: left;
      border: 1px solid #1f1f1f;
      background: rgba(0,0,0,0.55);
      padding: 18px;
    }

    .field {
      margin-bottom: 14px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      color: #bdbdbd;
    }

    input, button, select, textarea {
      width: 100%;
      background: #000;
      color: #cfcfcf;
      border: 1px solid var(--border);
      padding: 10px;
      font-family: monospace;
    }

    button {
      cursor: pointer;
    }

    button:hover {
      border-color: #999;
    }

    .login-actions {
      margin-top: 14px;
    }

    .status {
      min-height: 20px;
      margin-top: 12px;
      color: #9e9e9e;
    }

    .account-header {
      text-align: left;
      margin-bottom: 20px;
      border-bottom: 1px solid #231313;
      padding-bottom: 12px;
    }

    .account-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
      text-align: left;
    }

    .card {
      border: 1px solid #1f1f1f;
      background: rgba(0,0,0,0.45);
      padding: 16px;
    }

    .card h3 {
      margin-top: 0;
      margin-bottom: 10px;
      color: #d8d8d8;
      font-size: 16px;
    }

    .meta {
      color: #8f8f8f;
      font-size: 13px;
    }

    .logout-row {
      margin-top: 18px;
      text-align: right;
    }

    .small-btn {
      width: auto;
      padding: 8px 14px;
      display: inline-block;
    }

    audio {
      width: 100%;
      margin-top: 10px;
      filter: grayscale(1) contrast(1.1);
    }

    iframe {
      width: 100%;
      max-width: 100%;
      border: 1px solid #222;
      background: #000;
    }

    p {
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div id="eyes-layer"></div>

  <div id="app" class="panel">
    <div id="login-screen">
      <p class="red screen-title">JARDIM_EDEN_SYSTEM v1.3</p>
      <p>> acesso detectado</p>
      <p>> autenticação necessária</p>
      <p class="subtle">somente contatos autorizados devem prosseguir</p>

      <div class="login-box">
        <div class="field">
          <label for="login-user">Usuário</label>
          <input id="login-user" type="text" autocomplete="off" placeholder="ex.: Carl Graham">
        </div>

        <div class="field">
          <label for="login-pass">Senha</label>
          <input id="login-pass" type="password" autocomplete="off" placeholder="**********">
        </div>

        <div class="login-actions">
          <button onclick="doLogin()">Entrar</button>
        </div>

        <p id="login-status" class="status"></p>
      </div>
    </div>

    <div id="account-screen" class="hidden">
      <div class="account-header">
        <p class="red" id="account-title">CONTA CARREGADA</p>
        <p id="account-user-line">usuário: --</p>
        <p id="account-role-line" class="meta">perfil: --</p>
      </div>

      <div id="account-content" class="account-grid"></div>

      <div class="logout-row">
        <button class="small-btn" onclick="logout()">Sair</button>
      </div>
    </div>
  </div>

  <script>
    const eyesLayer = document.getElementById("eyes-layer");
    const body = document.body;
    const app = document.getElementById("app");

    const loginScreen = document.getElementById("login-screen");
    const accountScreen = document.getElementById("account-screen");
    const loginStatus = document.getElementById("login-status");
    const accountTitle = document.getElementById("account-title");
    const accountUserLine = document.getElementById("account-user-line");
    const accountRoleLine = document.getElementById("account-role-line");
    const accountContent = document.getElementById("account-content");

    let horrorStarted = false;
    let eyeInterval = null;
    let eyeCount = 0;
    let mouseX = window.innerWidth / 2;
    let mouseY = window.innerHeight / 2;

    const accounts = {
      "carl graham": {
        password: "46616c686f",
        displayName: "Carl Graham",
        role: "Carne Apodrecendo.",
        html: `
          <div class="card">
            <h3>Arquivo recuperado</h3>
            <p>Um arquivo de áudio foi associado a esta conta.</p>
            <p class="meta">nome do arquivo: PrimeiroParticipante.mp3</p>
            <audio controls>
              <source src="PrimeiroParticipante.mp3" type="audio/mpeg">
              Seu navegador não suporta áudio.
            </audio>
            <p style="margin-top:12px;">
              <a href="PrimeiroParticipante.mp3" download>baixar PrimeiroParticipante.mp3</a>
            </p>
          </div>

          <div class="card">
            <h3>Observações</h3>
            <p>Esta conta parece ter sido a primeira a registrar atividade relevante.</p>
            <p class="meta">status: fragmentos disponíveis</p>
          </div>
        `
      },

      "john mahnfredy": {
        password: "30333a3132",
        displayName: "John Mahnfredy",
        role: "Vidro Estilhaçado.",
        html: `
          <div class="card">
            <h3>Caixa de entrada vazia</h3>
            <p>Nenhum arquivo foi associado a esta conta ainda.</p>
            <p class="meta">status: conteúdo indefinido</p>
          </div>

          <div class="card">
            <h3>Observações</h3>
            <p>Você pode substituir este bloco por pistas, imagens, textos ou outro áudio depois.</p>
          </div>
        `
      },

      "erik carpinter": {
        password: "446961626f",
        displayName: "Erik Carpinter",
        role: "Grama Morta.",
        html: `
          <div class="card">
            <h3>Registro indisponível</h3>
            <p>Esta conta existe, mas o conteúdo ainda não foi definido.</p>
            <p class="meta">status: bloqueado / aguardando dados</p>
          </div>

          <div class="card">
            <h3>Observações</h3>
            <p>Você pode usar esta área para outro enigma, um documento, coordenadas ou uma senha futura.</p>
          </div>
        `
      },

      "infernus": {
        password: "BlackSky",
        displayName: "Infernus",
        role: "Consciência Fragmentada.",
        html: `
          <div class="card">
            <h3>Conscious</h3>
            <iframe
              height="315"
              src="https://www.youtube.com/embed/CiRvNm_oxRE"
              title="Conscious"
              frameborder="0"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
              allowfullscreen>
            </iframe>
          </div>

          <div class="card">
            <h3>SubConscious</h3>
            <iframe
              height="315"
              src="https://www.youtube.com/embed/9IenXYjvqQA"
              title="SubConscious"
              frameborder="0"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
              allowfullscreen>
            </iframe>
          </div>
        `
      }
    };

    function clean(v) {
      return v.trim().toLowerCase();
    }

    function pulseGlitch() {
      app.classList.remove("glitch");
      void app.offsetWidth;
      app.classList.add("glitch");
    }

    function setShakeIntensity(level) {
      const map = {
        1: { x: 1.5, y: 1.5, rot: 0.3 },
        2: { x: 2.5, y: 2.5, rot: 0.5 },
        3: { x: 3.5, y: 3.5, rot: 0.8 },
        4: { x: 5, y: 4.5, rot: 1.1 }
      };

      const cfg = map[level] || map[1];
      document.documentElement.style.setProperty("--shake-x", cfg.x + "px");
      document.documentElement.style.setProperty("--shake-y", cfg.y + "px");
      document.documentElement.style.setProperty("--shake-rot", cfg.rot + "deg");
    }

    function startHorror() {
      if (horrorStarted) return;

      horrorStarted = true;
      body.classList.add("shaking");
      setShakeIntensity(1);
      addEyes(4);

      eyeInterval = setInterval(() => {
        addEyes(2);
      }, 1200);
    }

    function stopHorror() {
      body.classList.remove("shaking");
      horrorStarted = false;

      if (eyeInterval) {
        clearInterval(eyeInterval);
        eyeInterval = null;
      }

      const eyes = document.querySelectorAll(".eye");
      eyes.forEach((eye) => {
        eye.style.transition = "opacity 1.2s ease";
        eye.style.opacity = "0";
      });
    }

    function addEyes(amount) {
      for (let i = 0; i < amount; i++) {
        createEye();
      }
    }

    function createEye() {
      if (eyeCount >= 40) return;

      const eye = document.createElement("div");
      eye.className = "eye";

      const iris = document.createElement("div");
      iris.className = "iris";

      const pupil = document.createElement("div");
      pupil.className = "pupil";

      iris.appendChild(pupil);
      eye.appendChild(iris);

      const width = window.innerWidth;
      const height = window.innerHeight;

      const left = Math.random() * (width - 100);
      const top = Math.random() * (height - 60);
      const scale = 0.6 + Math.random() * 1.1;
      const rotate = -18 + Math.random() * 36;
      const opacity = 0.20 + Math.random() * 0.55;
      const blinkDuration = (2.8 + Math.random() * 4.5).toFixed(2) + "s";

      eye.style.left = left + "px";
      eye.style.top = top + "px";
      eye.style.transform = `scale(${scale}) rotate(${rotate}deg)`;
      eye.style.setProperty("--eye-opacity", opacity);
      eye.style.setProperty("--blink-duration", blinkDuration);

      eyesLayer.appendChild(eye);
      eyeCount++;

      updateEyeTracking(eye);

      if (eyeCount > 18) {
        const allEyes = document.querySelectorAll(".eye");
        const oldest = allEyes[0];
        if (oldest) {
          oldest.remove();
          eyeCount--;
        }
      }
    }

    function updateEyeTracking(singleEye = null) {
      const eyes = singleEye ? [singleEye] : document.querySelectorAll(".eye");

      eyes.forEach((eye) => {
        const pupil = eye.querySelector(".pupil");
        if (!pupil) return;

        const rect = eye.getBoundingClientRect();
        const eyeX = rect.left + rect.width / 2;
        const eyeY = rect.top + rect.height / 2;

        const dx = mouseX - eyeX;
        const dy = mouseY - eyeY;

        const angle = Math.atan2(dy, dx);
        const max = 6;

        const x = Math.cos(angle) * max;
        const y = Math.sin(angle) * max;

        pupil.style.transform = `translate(${x}px, ${y}px)`;
      });
    }

    function doLogin() {
      startHorror();

      const userInput = clean(document.getElementById("login-user").value);
      const passInput = document.getElementById("login-pass").value.trim();

      const account = accounts[userInput];

      if (!account || account.password !== passInput) {
        loginStatus.textContent = "credenciais inválidas.";
        pulseGlitch();
        addEyes(2);
        setShakeIntensity(2);
        return;
      }

      loginStatus.textContent = "acesso autorizado.";
      accountTitle.textContent = "CONTA CARREGADA";
      accountUserLine.textContent = "usuário: " + account.displayName;
      accountRoleLine.textContent = "perfil: " + account.role;
      accountContent.innerHTML = account.html;

      loginScreen.classList.add("hidden");
      accountScreen.classList.remove("hidden");

      pulseGlitch();
      setShakeIntensity(userInput === "infernus" ? 4 : 3);
      addEyes(userInput === "infernus" ? 6 : 3);

      setTimeout(() => {
        stopHorror();
      }, 900);
    }

    function logout() {
      accountScreen.classList.add("hidden");
      loginScreen.classList.remove("hidden");
      accountContent.innerHTML = "";
      loginStatus.textContent = "";
      document.getElementById("login-user").value = "";
      document.getElementById("login-pass").value = "";
      pulseGlitch();
    }

    document.addEventListener("mousemove", (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;
      updateEyeTracking();
    });

    document.getElementById("login-user").addEventListener("focus", startHorror, { once: true });
    document.getElementById("login-pass").addEventListener("focus", startHorror, { once: true });

    document.getElementById("login-user").addEventListener("input", () => {
      startHorror();
      if (Math.random() > 0.7) addEyes(1);
    });

    document.getElementById("login-pass").addEventListener("input", () => {
      startHorror();
      if (Math.random() > 0.55) addEyes(1);
    });

    document.getElementById("login-pass").addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        doLogin();
      }
    });
  </script>
</body>
</html>
